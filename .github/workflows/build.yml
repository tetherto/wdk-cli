name: build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: tetherto/oss-actions/node-base@v1
      - run: npm run typecheck
      - run: npm run lint
  test:
    needs: lint
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: tetherto/oss-actions/node-base@v1
      - name: Run tests
        run: npm test
